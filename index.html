<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Drought Monitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/alasql/4.4.0/alasql.min.js"></script>
    <style>
        .map-container {
            position: relative;
            width: 840px;
            height: 840px;
            margin: 20px auto;
            background-color: #ffffff;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 840px;
            height: 840px;
        }
        /* CRITICAL: Vector layer goes on bottom for input detection, Raster is transparency-blended on top */
        #C_raster { pointer-events: none; mix-blend-mode: multiply; }
        #C_vector { z-index: 10; }
    </style>
</head>
<body>
    <div class="map-container">
        <canvas id="C_vector"></canvas>
        <canvas id="C_raster"></canvas>
    </div>
    <div id="animation_panel" style="margin: 15px 0; padding: 10px; background: #f3f3f3; border: 1px solid #ccc; display: flex; gap: 15px; align-items: center;">
        <label>Start: <input type="date" id="anim_start_date" value="2021-07-14"></label>
        <label>End: <input type="date" id="anim_end_date" value="2024-11-13"></label>
        <label>FPS: <input type="number" id="anim_fps" value="2" min="1" max="15" style="width: 50px;"></label>
        <button id="btn_start_anim" style="padding: 5px 15px; background: #0055ff; color: white; border: none; cursor: pointer;">Play Animation</button>
        <button id="btn_stop_anim" style="padding: 5px 15px; background: #ff3333; color: white; border: none; cursor: pointer;">Stop</button>
    </div>
<script src="script.js"></script>
</body>
</html>
